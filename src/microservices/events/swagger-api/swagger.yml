swagger: "2.0"
info:
  title: Events API
  description: |
    API спецификация для микросервиса Events.
    Я бы не делал отдельнй сервис событий, т.к. это распределяет бизнес-фанкциональность. 
    По текущим требованям это чисто технический сервис, не несущий полезной бизнес нагрузки
  version: 1.0.0

host: localhost:8082

tags:
  - name: events
    description: Операции с событиями
  - name: health
    description: Проверка работоспособности сервисов

paths:
  # Микросервис событий
  /api/events/health:
    get:
      tags:
        - health
      summary: Проверка работоспособности микросервиса событий
      description: Возвращает статус работоспособности микросервиса событий
      operationId: getEventsServiceHealth
      produces:
        - application/json
      responses:
        "200":
          description: Успешный ответ
          schema:
            type: object
            properties:
              status:
                type: boolean
                example: true

  /api/events/movie:
    post:
      tags:
        - events
      summary: Создание события фильма
      description: Регистрирует новое событие, связанное с фильмом
      operationId: createMovieEvent
      consumes:
        - "application/json"
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          description: Данные события фильма
          required: true
          schema:
            $ref: "#/definitions/MovieEvent"
      responses:
        "201":
          description: Событие успешно создано
          schema:
            $ref: "#/definitions/EventResponse"
        "400":
          description: Некорректный запрос
          schema:
            $ref: "#/definitions/Error"
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: "#/definitions/Error"

  /api/events/user:
    post:
      tags:
        - events
      summary: Создание события пользователя
      description: Регистрирует новое событие, связанное с пользователем
      operationId: createUserEvent
      consumes:
        - "application/json"
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          description: Данные события пользователя
          required: true
          schema:
            $ref: "#/definitions/UserEvent"
      responses:
        "201":
          description: Событие успешно создано
          schema:
            $ref: "#/definitions/EventResponse"
        "400":
          description: Некорректный запрос
          schema:
            $ref: "#/definitions/Error"
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: "#/definitions/Error"

  /api/events/payment:
    post:
      tags:
        - events
      summary: Создание события платежа
      description: Регистрирует новое событие, связанное с платежом
      operationId: createPaymentEvent
      consumes:
        - "application/json"
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          description: Данные события платежа
          required: true
          schema:
            $ref: "#/definitions/PaymentEvent"
      responses:
        "201":
          description: Событие успешно создано
          schema:
            $ref: "#/definitions/EventResponse"
        "400":
          description: Некорректный запрос
          schema:
            $ref: "#/definitions/Error"
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: "#/definitions/Error"

definitions:
  # Основные модели данных
  Movie:
    type: object
    properties:
      id:
        type: integer
        description: Уникальный идентификатор фильма
        example: 1
      title:
        type: string
        description: Название фильма
        example: "Inception"
      description:
        type: string
        description: Описание фильма
        example: "A thief who steals corporate secrets through the use of dream-sharing technology is given the inverse task of planting an idea into the mind of a C.E.O."
      genres:
        type: array
        description: Жанры фильма
        items:
          type: string
        example: ["Sci-Fi", "Action", "Thriller"]
      rating:
        type: number
        format: float
        description: Рейтинг фильма
        example: 8.8
    required:
      - id
      - title
      - description
      - rating

  MovieInput:
    type: object
    properties:
      title:
        type: string
        description: Название фильма
        example: "Inception"
      description:
        type: string
        description: Описание фильма
        example: "A thief who steals corporate secrets through the use of dream-sharing technology is given the inverse task of planting an idea into the mind of a C.E.O."
      genres:
        type: array
        description: Жанры фильма
        items:
          type: string
        example: ["Sci-Fi", "Action", "Thriller"]
      rating:
        type: number
        format: float
        description: Рейтинг фильма
        example: 8.8
    required:
      - title
      - description
      - rating

  User:
    type: object
    properties:
      id:
        type: integer
        description: Уникальный идентификатор пользователя
        example: 1
      username:
        type: string
        description: Имя пользователя
        example: "john_doe"
      email:
        type: string
        format: email
        description: Email пользователя
        example: "john.doe@example.com"
    required:
      - id
      - username
      - email

  UserInput:
    type: object
    properties:
      username:
        type: string
        description: Имя пользователя
        example: "john_doe"
      email:
        type: string
        format: email
        description: Email пользователя
        example: "john.doe@example.com"
    required:
      - username
      - email

  Payment:
    type: object
    properties:
      id:
        type: integer
        description: Уникальный идентификатор платежа
        example: 1
      user_id:
        type: integer
        description: Идентификатор пользователя, совершившего платеж
        example: 1
      amount:
        type: number
        format: float
        description: Сумма платежа
        example: 9.99
      timestamp:
        type: string
        format: date-time
        description: Время совершения платежа
        example: "2023-01-15T14:30:00Z"
    required:
      - id
      - user_id
      - amount
      - timestamp

  PaymentInput:
    type: object
    properties:
      user_id:
        type: integer
        description: Идентификатор пользователя, совершающего платеж
        example: 1
      amount:
        type: number
        format: float
        description: Сумма платежа
        example: 9.99
    required:
      - user_id
      - amount

  Subscription:
    type: object
    properties:
      id:
        type: integer
        description: Уникальный идентификатор подписки
        example: 1
      user_id:
        type: integer
        description: Идентификатор пользователя, оформившего подписку
        example: 1
      plan_type:
        type: string
        description: Тип плана подписки
        example: "premium"
      start_date:
        type: string
        format: date-time
        description: Дата начала подписки
        example: "2023-01-01T00:00:00Z"
      end_date:
        type: string
        format: date-time
        description: Дата окончания подписки
        example: "2023-12-31T23:59:59Z"
    required:
      - id
      - user_id
      - plan_type
      - start_date
      - end_date

  SubscriptionInput:
    type: object
    properties:
      user_id:
        type: integer
        description: Идентификатор пользователя, оформляющего подписку
        example: 1
      plan_type:
        type: string
        description: Тип плана подписки
        example: "premium"
      start_date:
        type: string
        format: date-time
        description: Дата начала подписки
        example: "2023-01-01T00:00:00Z"
      end_date:
        type: string
        format: date-time
        description: Дата окончания подписки
        example: "2023-12-31T23:59:59Z"
    required:
      - user_id
      - plan_type
      - start_date
      - end_date

  # Модели событий
  Event:
    type: object
    properties:
      id:
        type: string
        description: Уникальный идентификатор события
        example: "movie-1-viewed"
      type:
        type: string
        description: Тип события
        example: "movie"
      timestamp:
        type: string
        format: date-time
        description: Время события
        example: "2023-01-15T14:30:00Z"
      payload:
        type: object
        description: Полезная нагрузка события (зависит от типа события)
    required:
      - id
      - type
      - timestamp
      - payload

  MovieEvent:
    type: object
    properties:
      movie_id:
        type: integer
        description: Идентификатор фильма
        example: 1
      title:
        type: string
        description: Название фильма
        example: "Inception"
      action:
        type: string
        description: Действие с фильмом
        example: "viewed"
      user_id:
        type: integer
        description: Идентификатор пользователя (опционально)
        example: 1
      rating:
        type: number
        format: float
        description: Рейтинг (опционально)
        example: 8.5
      genres:
        type: array
        description: Жанры фильма (опционально)
        items:
          type: string
        example: ["Sci-Fi", "Action"]
      description:
        type: string
        description: Описание фильма (опционально)
        example: "A mind-bending thriller"
    required:
      - movie_id
      - title
      - action

  UserEvent:
    type: object
    properties:
      user_id:
        type: integer
        description: Идентификатор пользователя
        example: 1
      username:
        type: string
        description: Имя пользователя (опционально)
        example: "john_doe"
      email:
        type: string
        description: Email пользователя (опционально)
        example: "john.doe@example.com"
      action:
        type: string
        description: Действие пользователя
        example: "registered"
      timestamp:
        type: string
        format: date-time
        description: Время события
        example: "2023-01-15T14:30:00Z"
    required:
      - user_id
      - action
      - timestamp

  PaymentEvent:
    type: object
    properties:
      payment_id:
        type: integer
        description: Идентификатор платежа
        example: 1
      user_id:
        type: integer
        description: Идентификатор пользователя
        example: 1
      amount:
        type: number
        format: float
        description: Сумма платежа
        example: 9.99
      status:
        type: string
        description: Статус платежа
        example: "completed"
      timestamp:
        type: string
        format: date-time
        description: Время платежа
        example: "2023-01-15T14:30:00Z"
      method_type:
        type: string
        description: Тип метода оплаты (опционально)
        example: "credit_card"
    required:
      - payment_id
      - user_id
      - amount
      - status
      - timestamp

  EventResponse:
    type: object
    properties:
      status:
        type: string
        description: Статус операции
        example: "success"
      partition:
        type: integer
        description: Партиция Kafka
        example: 0
      offset:
        type: integer
        description: Смещение в партиции Kafka
        example: 42
      event:
        $ref: "#/definitions/Event"
    required:
      - status
      - partition
      - offset
      - event

  Error:
    type: object
    properties:
      error:
        type: string
        description: Сообщение об ошибке
        example: "Internal Server Error"
    required:
      - error
