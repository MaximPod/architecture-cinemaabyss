apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cinemaabyss-ingress
  namespace: cinemaabyss
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    #nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  tls:
  - hosts:
    - cinemaabyss.example.com
    secretName: cinemaabyss-tls

  rules:
  - host: cinemaabyss.example.com
    http:
      paths:
      - path: /api/movies
        pathType: Prefix
        backend:
          service:
            name: proxy-service
            port:
              number: 8000
      
      #дополните конфигурацию для /
      - path: /api/events/health
        pathType: Prefix
        backend:
          service:
            name: events-service
            port:
              number: 8082
      - path: /api/events/movie
        pathType: Prefix
        backend:
          service:
            name: events-service
            port:
              number: 8082
      - path: /api/events/user
        pathType: Prefix
        backend:
          service:
            name: events-service
            port:
              number: 8082
      - path: /api/events/payment
        pathType: Prefix
        backend:
          service:
            name: events-service
            port:
              number: 8082
